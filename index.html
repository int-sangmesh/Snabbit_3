<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snabbit — How we're doing today</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--pink:#ff1f8e;--pink-soft:#ffd9ec;--pink-bg:#ffeef6;--frame:#fff2f8;--edge:#ffd9ec;--ink:#2b1622;--ink-soft:#8a7681;--good:#0f9d8f;--card:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--frame);color:var(--ink);display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
  .stage{width:min(100vw, calc(100vh * 16 / 9));height:min(100vh, calc(100vw * 9 / 16));container-type:size;background:var(--pink-bg);}
  .panel{width:100%;height:100%;padding:2.6cqmin 3.2cqmin;display:flex;flex-direction:column;gap:2cqmin;}
  header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;flex:0 0 auto;}
  .logo{height:7.5cqmin;width:auto;display:block;}
  .ctr{text-align:center;line-height:1.25;}
  .tagline{font-size:1.9cqmin;font-weight:600;color:var(--ink-soft);}
  .dt{font-size:2.9cqmin;font-weight:700;color:var(--ink);}
  .dt .pink{color:var(--pink);}
  .live{justify-self:end;display:inline-flex;align-items:center;gap:1cqmin;color:var(--pink);font-size:2.3cqmin;font-weight:800;letter-spacing:.08em;}
  .blip{display:inline-block;width:1.4cqmin;height:1.4cqmin;border-radius:50%;background:var(--pink);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,31,142,.5);}70%{box-shadow:0 0 0 1.8cqmin rgba(255,31,142,0);}100%{box-shadow:0 0 0 0 rgba(255,31,142,0);}}
  .content{position:relative;flex:1;}
  .view{position:absolute;inset:0;opacity:0;transition:opacity .6s ease;pointer-events:none;display:flex;flex-direction:column;justify-content:space-evenly;}
  .view.active{opacity:1;}
  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6cqmin;}
  .htitle{display:flex;align-items:center;gap:1.5cqmin;font-weight:700;font-size:3cqmin;color:var(--ink);}
  .chip{width:5cqmin;height:5cqmin;background:var(--card);border:.25cqmin solid var(--edge);border-radius:1.5cqmin;display:inline-flex;align-items:center;justify-content:center;color:var(--pink);font-size:3cqmin;}
  .bignum{font-weight:800;font-size:14cqmin;line-height:1;letter-spacing:-.01em;color:var(--pink);height:1em;display:flex;font-variant-numeric:tabular-nums;}
  .cap{font-size:1.9cqmin;font-weight:600;font-style:italic;color:var(--ink-soft);}
  .deltas{display:flex;align-items:center;gap:2.6cqmin;margin-top:1.4cqmin;}
  .dblock{text-align:center;}
  .pill{display:inline-flex;align-items:center;gap:.7cqmin;background:#e7f5f0;color:var(--good);font-weight:800;font-size:3cqmin;padding:.8cqmin 2.4cqmin;border-radius:5cqmin;}
  .dcap{font-size:1.5cqmin;font-weight:700;letter-spacing:.05em;color:var(--ink-soft);margin-top:.8cqmin;}
  .vdiv{width:.2cqmin;height:6.5cqmin;background:var(--edge);}
  .metros{display:grid;grid-template-columns:repeat(5,1fr);gap:2.2cqw;width:88cqw;margin:0 auto;flex:0 0 auto;}
  .mcard{background:var(--card);border:.25cqmin solid var(--edge);border-radius:2cqmin;padding:2cqmin .8cqw;text-align:center;}
  .mval{font-weight:800;font-size:3.8cqmin;color:var(--ink);font-variant-numeric:tabular-nums;}
  .mname{font-size:2cqmin;font-weight:700;color:var(--ink-soft);margin:.3cqmin 0 .9cqmin;}
  .mgrow{display:flex;flex-direction:column;gap:.4cqmin;font-size:1.7cqmin;color:var(--ink-soft);font-weight:600;}
  .mgrow b{font-weight:800;}
  .mgrow .up{color:var(--good);} .mgrow .down{color:var(--bad);}
  .pair{flex:1;display:grid;grid-template-columns:1fr .15cqmin 1fr;gap:2.4cqmin;}
  .half{display:flex;flex-direction:column;justify-content:space-evenly;}
  .half .hero{gap:.5cqmin;}
  .half .bignum{font-size:12cqmin;}
  .half .pill{font-size:2.6cqmin;padding:.7cqmin 2cqmin;}
  .half .dcap{font-size:1.4cqmin;}
  .half .metros{display:grid;grid-template-columns:repeat(5,1fr);gap:1.3cqmin;width:auto;margin:0;}
  .half .mcard{width:auto;padding:1.5cqmin .4cqmin;}
  .half .mval{font-size:2.9cqmin;}
  .half .mname{font-size:1.7cqmin;margin:.2cqmin 0 .6cqmin;}
  .half .mgrow{font-size:1.35cqmin;gap:.3cqmin;}
  .reel{display:inline-block;height:1em;overflow:hidden;vertical-align:top;}
  .reel .col{display:block;transition:transform .9s cubic-bezier(.2,.85,.25,1);}
  .reel .col span{display:block;height:1em;}
</style>
</head>

<script>
  const SUPABASE_URL="https://rhzuzavqsdfqdojbpkhr.supabase.co";

  const ROTATE_MS=20000, POLL_MS=60000;
  const METROS=["NCR","MMR","BLR","PUN","HYD"];

  let snap=null, vIdx=0;
  const $=id=>document.getElementById(id);
  const fmtInt=n=>(n==null?"—":Number(n).toLocaleString('en-IN'));
  const fmtPct=n=>(n==null?"—":Number(n).toFixed(2)+"%");

  function odo(el,str,fromZero){
    const digits=[...String(str)].filter(c=>c>='0'&&c<='9');
    if(el.dataset.sig!==String(str).replace(/[0-9]/g,'#')){
      el.innerHTML=''; el.dataset.sig=String(str).replace(/[0-9]/g,'#');
      for(const ch of String(str)){
        if(ch>='0'&&ch<='9'){const r=document.createElement('span');r.className='reel';const c=document.createElement('span');c.className='col';for(let i=0;i<=9;i++){const d=document.createElement('span');d.textContent=i;c.appendChild(d);}r.appendChild(c);el.appendChild(r);}
        else{const s=document.createElement('span');s.textContent=ch;el.appendChild(s);}
      }
    }
    const cols=el.querySelectorAll('.col');
    if(fromZero){cols.forEach(c=>{c.style.transition='none';c.style.transform='translateY(0em)';});void el.offsetWidth;}
    cols.forEach((c,i)=>{if(fromZero)c.style.transition='transform .9s cubic-bezier(.2,.85,.25,1)';c.style.transform='translateY(-'+digits[i]+'em)';});
  }

  function setPill(el,val,goodWhenUp,isPct){
    if(val==null){el.textContent='—';return;}
    const zero=val===0,good=zero?null:(goodWhenUp?val>0:val<0);
    const arrow=good===null?'→':(good?'↑':'↓');
    el.innerHTML=arrow+' '+Math.abs(val)+(isPct?'%':'');
    el.style.background=good===false?'#fdeaed':'#e7f5f0';
    el.style.color=good===false?'#e23b5a':'#0f9d8f';
  }

  function growLine(label,val,goodWhenUp,growthPct){
    if(val==null) return '<span>'+label+' —</span>';
    const zero=val===0,good=zero?null:(goodWhenUp?val>0:val<0);
    const tri=good===null?'▬':(good?'▲':'▼');
    const cls=good===null?'':(good?'up':'down');
    return '<span>'+label+' <b class="'+cls+'">'+tri+Math.abs(val)+(growthPct?'%':'')+'</b></span>';
  }
  function renderMetro(elId,obj,o){
    const el=$(elId); if(!obj){el.innerHTML='';return;}
    el.innerHTML=METROS.map(mn=>{
      const d=obj[mn]||{};
      const val=d.v==null?'—':(o.valPct?Number(d.v).toFixed(2)+'%':Number(d.v).toLocaleString('en-IN'));
      return '<div class="mcard"><div class="mval">'+val+'</div><div class="mname">'+mn+'</div>'+
        '<div class="mgrow">'+growLine('DoD',d.dod,o.goodWhenUp,o.growthPct)+growLine('WoW',d.wow,o.goodWhenUp,o.growthPct)+'</div></div>';
    }).join('');
  }

  function rollView(i,fromZero){
    if(!snap)return; const m=snap.metrics;
    if(i===0) odo($('jobs'),fmtInt(m.completed_jobs.today),fromZero);
    if(i===1) odo($('experts'),fmtInt(m.present_experts.today),fromZero);
    if(i===2){odo($('eob'),fmtPct(m.eob_15plus.today),fromZero);odo($('scr'),fmtPct(m.scr.today),fromZero);}
  }

  function render(){
    if(!snap)return; const m=snap.metrics;
    rollView(0,false);rollView(1,false);rollView(2,false);
    setPill($('jobs_dy'),m.completed_jobs.vs_yesterday_pct,true,true);
    setPill($('jobs_lw'),m.completed_jobs.vs_last_week_pct,true,true);
    setPill($('exp_dy'),m.present_experts.vs_yesterday_pct,true,true);
    setPill($('exp_lw'),m.present_experts.vs_last_week_pct,true,true);
    setPill($('eob_dy'),m.eob_15plus.vs_yesterday_pts,false,false);
    setPill($('eob_lw'),m.eob_15plus.vs_last_week_pts,false,false);
    setPill($('scr_dy'),m.scr.vs_yesterday_pts,false,false);
    setPill($('scr_lw'),m.scr.vs_last_week_pts,false,false);
    renderMetro('m_jobs',m.completed_jobs.by_metro,{valPct:false,goodWhenUp:true,growthPct:true});
    renderMetro('m_exp',m.present_experts.by_metro,{valPct:false,goodWhenUp:true,growthPct:true});
    renderMetro('m_eob',m.eob_15plus.by_metro,{valPct:true,goodWhenUp:false,growthPct:false});
    renderMetro('m_scr',m.scr.by_metro,{valPct:true,goodWhenUp:false,growthPct:false});
  }

  const views=document.querySelectorAll('.view');
  function activate(i){views.forEach((v,k)=>v.classList.toggle('active',k===i));rollView(i,true);}
  function rotate(){vIdx=(vIdx+1)%views.length;activate(vIdx);}
